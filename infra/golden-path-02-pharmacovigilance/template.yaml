AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  HCLS Golden Path — 02 Pharmacovigilance (ICSR Case Intake), fully wired end to end.
  Deploys the real agent workflow: a shared layer (platform_core + governance + core), the five
  workflow Lambdas (assemble -> draft -> check -> human gate (waitForTaskToken) -> finalize), the
  governed connector Lambda (the deployed gateway enforcement point), the Step Functions state
  machine from the native ASL, an HTTP API with a Cognito JWT authorizer + access logging +
  throttling, a PHI-tuned Bedrock Guardrail (prompt-attack in+out), an append-only audit table, and
  a pending-approvals table. Per-function least-privilege roles. Deploy: ./deploy.sh ; tear down: ./destroy.sh
  NOTE: the irreversible ICSR submission is WITHHELD from the agent (policy.CONSEQUENTIAL_COMMITS);
  the agent records a DRAFT and a qualified person commits. CSV/CSA + live connectors are the engagement.

Parameters:
  Environment: { Type: String, Default: dev, AllowedValues: [dev, test, prod] }
  ConnectorMode: { Type: String, Default: fixture, AllowedValues: [fixture, live] }
  # A6 — real external safety source. "openfda" makes safety.get_case /
  # search_duplicates read live, de-identified FAERS data from api.fda.gov
  # (read-only; writes/submission stay human-gated). Requires ConnectorMode=live
  # AND a controlled egress path to api.fda.gov — deploy egress-openfda.yaml
  # (AWS Network Firewall FQDN allow-list) and route the connector subnet through it.
  SafetySource: { Type: String, Default: "", AllowedValues: ["", "openfda"], Description: "Empty = fixture/reference safety service. 'openfda' = real read-only FAERS via api.fda.gov (needs ConnectorMode=live + egress-openfda.yaml)." }
  BedrockModelId: { Type: String, Default: us.anthropic.claude-sonnet-4-5-20250929-v1:0 }
  TokenSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: "HMAC secret for gateway/approval tokens. Supply a STRONG, UNIQUE per-deploy secret (>= 32 chars; e.g. generate with `python3 -c 'import secrets;print(secrets.token_hex(32))'`). No default is provided; the 27-char dev constant is intentionally rejected. PRODUCTION: replace with AgentCore Identity / KMS via Secrets Manager (docs/INCIDENT-RESPONSE-AND-KEY-MANAGEMENT.md)."
  StrictApproval: { Type: String, Default: "1", AllowedValues: ["0", "1"], Description: "1 = require a bound approval token (single-use, SoD, args-bound). Recommended in all deployed environments." }
  ApiThrottleBurst: { Type: Number, Default: 20 }
  ApiThrottleRate: { Type: Number, Default: 10 }
  # F7 — VPC attachment for the workflow Lambdas. Pass the private subnets + app
  # SG from the network stack to keep all function egress inside the customer VPC
  # (over the VPC endpoints in network.yaml). Leave empty (default) for a quick
  # standalone `sam deploy` where the functions run in the Lambda-managed network.
  VpcSubnetIds:
    Type: CommaDelimitedList
    Default: ""
    Description: Private subnet IDs for Lambda VpcConfig. Empty = no VPC attachment.
  VpcSecurityGroupId:
    Type: String
    Default: ""
    Description: App security group id for Lambda VpcConfig. Empty = no VPC attachment.

Conditions:
  # Attach Lambdas to the VPC only when both a subnet list and an app SG are
  # supplied. Keeps the standalone `sam deploy` (empty defaults) working.
  VpcAttach: !And
    - !Not [!Equals [!Join ["", !Ref VpcSubnetIds], ""]]
    - !Not [!Equals [!Ref VpcSecurityGroupId, ""]]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures: [arm64]
    Layers: [!Ref SharedLayer]
    VpcConfig: !If
      - VpcAttach
      - SubnetIds: !Ref VpcSubnetIds
        SecurityGroupIds: [!Ref VpcSecurityGroupId]
      - !Ref "AWS::NoValue"
    Environment:
      Variables:
        CONNECTOR_MODE: !Ref ConnectorMode
        SAFETY_SOURCE: !Ref SafetySource          # A6: "openfda" -> real FAERS read (via egress-openfda.yaml)
        AUDIT_TABLE: !Ref AuditTable
        PENDING_TABLE: !Ref PendingApprovalsTable
        AGENT_ID: 02-pharmacovigilance
        GATEWAY_TOKEN_SECRET: !Ref TokenSecret
        APPROVAL_TOKEN_SECRET: !Ref TokenSecret
        STRICT_APPROVAL: !Ref StrictApproval
        APPROVAL_CONSUMPTION_TABLE: !Ref ApprovalConsumptionTable
        LLM_PROVIDER: bedrock
        BEDROCK_GUARDRAIL_ID: !Ref AgentGuardrail
        BEDROCK_GUARDRAIL_VERSION: DRAFT
        BEDROCK_NARRATIVE_MODEL_ID: !Ref BedrockModelId
        BEDROCK_REGION: !Ref AWS::Region
        MASK_NER: "1"   # enable Comprehend NER (name masking) in the draft's masking-before-model pass

Resources:
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "hcls-02-${Environment}-shared"
      Description: platform_core + governance + agent core for the pharmacovigilance golden path.
      ContentUri: layer/
      CompatibleRuntimes: [python3.12]
      RetentionPolicy: Delete

  AuditTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "hcls-02-${Environment}-audit"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: audit_id, AttributeType: S }
        - { AttributeName: ts, AttributeType: S }
      KeySchema:
        - { AttributeName: audit_id, KeyType: HASH }
        - { AttributeName: ts, KeyType: RANGE }
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }
      SSESpecification: { SSEEnabled: true }

  PendingApprovalsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "hcls-02-${Environment}-pending-approvals"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [ { AttributeName: approval_id, AttributeType: S } ]
      KeySchema: [ { AttributeName: approval_id, KeyType: HASH } ]
      TimeToLiveSpecification: { AttributeName: ttl, Enabled: true }
      SSESpecification: { SSEEnabled: true }

  # round-2 #1: durable, single-use approval-token registry (replay protection that
  # survives cold starts / separate Lambda environments). Claimed by conditional PutItem.
  ApprovalConsumptionTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "hcls-02-${Environment}-approval-consumption"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [ { AttributeName: jti, AttributeType: S } ]
      KeySchema: [ { AttributeName: jti, KeyType: HASH } ]
      TimeToLiveSpecification: { AttributeName: ttl, Enabled: true }
      SSESpecification: { SSEEnabled: true }

  AssembleFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "hcls-02-${Environment}-assemble"
      Handler: assemble.handler
      CodeUri: ../../aws-native-reference/02-pharmacovigilance/lambdas/
      Policies: [AWSLambdaBasicExecutionRole]
  DraftFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "hcls-02-${Environment}-draft"
      Handler: draft.handler
      CodeUri: ../../aws-native-reference/02-pharmacovigilance/lambdas/
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            # InvokeModel via boto3 Converse. Cross-region inference profiles route to the
            # underlying foundation models in several regions, so allow both the account's
            # inference profiles and the anthropic foundation models across regions.
            - Effect: Allow
              Action: [bedrock:InvokeModel, bedrock:InvokeModelWithResponseStream]
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/anthropic.*"
                - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*"
        - Statement:
            - { Effect: Allow, Action: [bedrock:ApplyGuardrail], Resource: !GetAtt AgentGuardrail.GuardrailArn }
        - Statement:
            # Masking-before-model: NER (names) via Comprehend + PHI via Comprehend Medical. These
            # detect APIs do not support resource-level IAM, so the resource is "*" (the required scope).
            - { Effect: Allow, Action: [comprehend:DetectPiiEntities, comprehendmedical:DetectPHI], Resource: "*" }
  CheckFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "hcls-02-${Environment}-check"
      Handler: check.handler
      CodeUri: ../../aws-native-reference/02-pharmacovigilance/lambdas/
      Policies: [AWSLambdaBasicExecutionRole]
  FinalizeFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "hcls-02-${Environment}-finalize"
      Handler: finalize.handler
      CodeUri: ../../aws-native-reference/02-pharmacovigilance/lambdas/
      Environment:
        Variables:
          # round-2 #3: the consequential submit runs through the GOVERNED connector,
          # not a local stub. Mandatory in strict mode (see finalize._submit_report).
          SAFETY_CONNECTOR_FUNCTION: !Ref ConnectorFn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - { Effect: Allow, Action: [dynamodb:PutItem], Resource: !GetAtt AuditTable.Arn }
            - { Effect: Allow, Action: [dynamodb:PutItem, dynamodb:GetItem], Resource: !GetAtt ApprovalConsumptionTable.Arn }
            - { Effect: Allow, Action: [lambda:InvokeFunction], Resource: !GetAtt ConnectorFn.Arn }
  HitlNotifyFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "hcls-02-${Environment}-hitl-notify"
      Handler: hitl_notify.handler
      CodeUri: ../../aws-native-reference/02-pharmacovigilance/lambdas/
      Environment:
        Variables:
          REVIEW_TABLE: !Ref PendingApprovalsTable   # durable review queue (fail-closed #5)
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - { Effect: Allow, Action: [dynamodb:PutItem], Resource: !GetAtt PendingApprovalsTable.Arn }

  ConnectorFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "hcls-02-${Environment}-connector"
      Handler: handler.handler
      CodeUri: ../../aws-native-reference/_shared/connector/
      Environment:
        Variables:
          CONNECTOR_KIND: safety
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - { Effect: Allow, Action: [dynamodb:PutItem], Resource: !GetAtt AuditTable.Arn }
            - { Effect: Allow, Action: [dynamodb:PutItem, dynamodb:GetItem], Resource: !GetAtt ApprovalConsumptionTable.Arn }
      Events:
        Tool:
          Type: HttpApi
          Properties: { ApiId: !Ref GatewayApi, Method: POST, Path: "/tool/{kind}/{method}" }

  AgentGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub "hcls-02-${Environment}"
      Description: PHI-tuned PII + prompt-attack (in+out) for pharmacovigilance (adverse-event PHI).
      BlockedInputMessaging: "I can't help with that request."
      BlockedOutputsMessaging: "I can't provide that information."
      ContentPolicyConfig:
        FiltersConfig:
          - { Type: PROMPT_ATTACK, InputStrength: HIGH, OutputStrength: NONE }
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - { Type: US_SOCIAL_SECURITY_NUMBER, Action: BLOCK }
          - { Type: NAME, Action: ANONYMIZE }
          - { Type: ADDRESS, Action: ANONYMIZE }
          - { Type: AGE, Action: ANONYMIZE }
          - { Type: EMAIL, Action: ANONYMIZE }
          - { Type: PHONE, Action: ANONYMIZE }
      TopicPolicyConfig:
        TopicsConfig:
          - Name: UnauthorizedRegulatorySubmission
            Definition: Submitting an ICSR or making a causality/reportability determination; the agent only drafts and a qualified person commits.
            Type: DENY

  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub "hcls-02-${Environment}"
      AdminCreateUserConfig: { AllowAdminCreateUserOnly: true }
      MfaConfiguration: "ON"
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      Policies:
        PasswordPolicy: { MinimumLength: 14, RequireUppercase: true, RequireLowercase: true, RequireNumbers: true, RequireSymbols: true }
      UserPoolAddOns: { AdvancedSecurityMode: ENFORCED }
      Schema: [ { Name: hcls_role, AttributeDataType: String, Mutable: false } ]
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub "hcls-02-${Environment}-app"
      GenerateSecret: false
      ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
      TokenValidityUnits: { AccessToken: minutes, IdToken: minutes, RefreshToken: hours }
      AccessTokenValidity: 15
      IdTokenValidity: 15
      RefreshTokenValidity: 8

  GatewayApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              audience: [!Ref UserPoolClient]
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
      AccessLogSettings:
        DestinationArn: !GetAtt GatewayAccessLogs.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","route":"$context.routeKey","status":"$context.status","sub":"$context.authorizer.claims.sub"}'
      DefaultRouteSettings: { ThrottlingBurstLimit: !Ref ApiThrottleBurst, ThrottlingRateLimit: !Ref ApiThrottleRate }
  GatewayAccessLogs:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties: { LogGroupName: !Sub "/hcls/02/${Environment}/gateway-access", RetentionInDays: 365 }

  AgentStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "hcls-02-${Environment}"
      DefinitionUri: ../../aws-native-reference/02-pharmacovigilance/stepfunctions/pharmacovigilance.asl.json
      DefinitionSubstitutions:
        AssembleFunctionArn: !GetAtt AssembleFn.Arn
        DraftFunctionArn: !GetAtt DraftFn.Arn
        CheckFunctionArn: !GetAtt CheckFn.Arn
        HitlNotifyFunctionArn: !GetAtt HitlNotifyFn.Arn
        FinalizeFunctionArn: !GetAtt FinalizeFn.Arn
      Logging:
        Level: ALL
        IncludeExecutionData: false
        Destinations: [ { CloudWatchLogsLogGroup: { LogGroupArn: !GetAtt StateMachineLogs.Arn } } ]
      Policies:
        - Statement:
            - Effect: Allow
              Action: [lambda:InvokeFunction]
              Resource: [!GetAtt AssembleFn.Arn, !GetAtt DraftFn.Arn, !GetAtt CheckFn.Arn, !GetAtt HitlNotifyFn.Arn, !GetAtt FinalizeFn.Arn]
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogDelivery, logs:GetLogDelivery, logs:UpdateLogDelivery, logs:DeleteLogDelivery, logs:ListLogDeliveries, logs:PutResourcePolicy, logs:DescribeResourcePolicies, logs:DescribeLogGroups]
              Resource: "*"
  StateMachineLogs:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties: { LogGroupName: !Sub "/hcls/02/${Environment}/statemachine", RetentionInDays: 365 }

Outputs:
  StateMachineArn:
    Description: Start an execution with aws-native-reference/02-pharmacovigilance/sample_input.json
    Value: !Ref AgentStateMachine
  GatewayUrl: { Value: !Sub "https://${GatewayApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}" }
  AuditTableName: { Value: !Ref AuditTable }
  PendingApprovalsTableName: { Value: !Ref PendingApprovalsTable }
  UserPoolId: { Value: !Ref UserPool }
  GuardrailId: { Value: !Ref AgentGuardrail }
