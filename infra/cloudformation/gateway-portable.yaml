AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HCLS Agent Suite - MCP layer (Path A, PORTABLE) as Amazon API Gateway (HTTP API)
  + a Cognito JWT authorizer in front of the connector Lambdas. This is the
  any-region, no-preview-dependency equivalent of the AgentCore Gateway: identical
  governed semantics (the connector Lambda runs every call through platform_core's
  MCPGateway — deny-by-default, least-privilege intersection, human-approval gate,
  scoped token, append-only audit), reachable over MCP/HTTPS, deployable in a brand
  new customer account in any commercial region.

  One route per system of record:  POST /mcp/{kind}  ->  hcls-<env>-connector-<kind>
  The caller presents a Cognito-issued JWT (from the customer IdP federation); the
  authorizer validates issuer + audience before the request reaches a connector.

Parameters:
  Environment: { Type: String, Default: dev }
  UserPoolId: { Type: String }
  UserPoolClientId: { Type: String, Description: JWT audience (Cognito app client) }
  RimConnectorArn: { Type: String }
  DmsConnectorArn: { Type: String }
  SafetyConnectorArn: { Type: String }
  MeddraConnectorArn: { Type: String }
  WhodrugConnectorArn: { Type: String }
  EdcConnectorArn: { Type: String }
  CtmsConnectorArn: { Type: String }
  EtmfConnectorArn: { Type: String }
  RwdConnectorArn: { Type: String }
  QmsConnectorArn: { Type: String }
  CrmConnectorArn: { Type: String }
  MlrConnectorArn: { Type: String }

Resources:
  McpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "hcls-${Environment}-mcp-gateway"
      ProtocolType: HTTP
      Description: HCLS governed MCP gateway (portable). One route per system of record.

  JwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref McpApi
      AuthorizerType: JWT
      Name: !Sub "hcls-${Environment}-cognito-jwt"
      IdentitySource: ["$request.header.Authorization"]
      JwtConfiguration:
        Audience: [!Ref UserPoolClientId]
        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"

  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref McpApi
      StageName: "$default"
      AutoDeploy: true

  # ---- Integrations + routes + invoke permissions, one set per connector ----
  RimIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties: { ApiId: !Ref McpApi, IntegrationType: AWS_PROXY, IntegrationUri: !Ref RimConnectorArn, PayloadFormatVersion: "2.0" }
  RimRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref McpApi, RouteKey: "POST /mcp/rim", AuthorizationType: JWT, AuthorizerId: !Ref JwtAuthorizer, Target: !Sub "integrations/${RimIntegration}" }
  RimPerm:
    Type: AWS::Lambda::Permission
    Properties: { FunctionName: !Ref RimConnectorArn, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${McpApi}/*/*/mcp/rim" }

  DmsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties: { ApiId: !Ref McpApi, IntegrationType: AWS_PROXY, IntegrationUri: !Ref DmsConnectorArn, PayloadFormatVersion: "2.0" }
  DmsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref McpApi, RouteKey: "POST /mcp/dms", AuthorizationType: JWT, AuthorizerId: !Ref JwtAuthorizer, Target: !Sub "integrations/${DmsIntegration}" }
  DmsPerm:
    Type: AWS::Lambda::Permission
    Properties: { FunctionName: !Ref DmsConnectorArn, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${McpApi}/*/*/mcp/dms" }

  SafetyIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties: { ApiId: !Ref McpApi, IntegrationType: AWS_PROXY, IntegrationUri: !Ref SafetyConnectorArn, PayloadFormatVersion: "2.0" }
  SafetyRoute:
