    Properties: { FunctionName: !Ref SafetyConnectorArn, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${McpApi}/*/*/mcp/safety" }

  MeddraIntegration:
