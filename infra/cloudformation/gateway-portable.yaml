    Properties: { ApiId: !Ref McpApi, RouteKey: "POST /mcp/safety", AuthorizationType: JWT, AuthorizerId: !Ref JwtAuthorizer, Target: !Sub "integrations/${SafetyIntegration}" }
  SafetyPerm:
