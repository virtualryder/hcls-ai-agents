Outputs:
  GatewayId:
    Description: Portable MCP gateway (API Gateway HTTP API) id
    Value: !Ref McpApi
    Export: { Name: !Sub "hcls-${Environment}-portable-gateway" }
  GatewayEndpoint:
    Description: Base URL — call POST {endpoint}/mcp/<kind> with a Cognito JWT
    Value: !GetAtt McpApi.ApiEndpoint
    Export: { Name: !Sub "hcls-${Environment}-portable-gateway-url" }
