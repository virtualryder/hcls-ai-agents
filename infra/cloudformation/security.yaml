AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HCLS Agent Suite - Security stack. Per-customer KMS key, Bedrock Guardrail
  (PHI + off-label + grounding controls), Cognito user pool optionally federated
  to the customer IdP (SAML/OIDC), and the agent execution role. These are the
  controls that make the data-residency and Part-11 stories real.

  F6 — Customer IdP federation: an AWS::Cognito::UserPoolIdentityProvider, a
  hosted-UI domain, and federated app-client wiring are created when
  IdpMetadataUrl is non-empty (Condition FederationEnabled). With an empty
  IdpMetadataUrl (dev default) the pool stays native Cognito and nothing
  federated is provisioned, so dev still deploys unchanged.

Parameters:
  Environment: { Type: String, Default: dev }
  IdpMetadataUrl:
    Type: String
    Default: ""
    Description: >
      SAML (or OIDC) metadata document URL for the customer IdP (Okta/Entra/AD
      FS). When non-empty, a Cognito UserPoolIdentityProvider + hosted-UI domain
      + federated app-client wiring are created. Empty (dev default) = native
      Cognito only. See docs/IDP-FEDERATION-RUNBOOK.md.
  CallbackUrl:
    Type: String
    Default: "https://localhost/callback"
    Description: >
      OAuth callback (redirect) URL registered on the app client for the hosted
      UI / reviewer app. Logout URL is derived as the same origin's /logout.
  UserPoolDomainPrefix:
    Type: String
    Default: ""
    Description: >
      Hosted-UI domain prefix (the {prefix}.auth.<region>.amazoncognito.com
      label). Required when federation is enabled; ignored otherwise. Lowercase
      letters, numbers and hyphens; must be globally unique in the region.

Conditions:
  # Federation is wired only when the customer passes a non-empty metadata URL.
  FederationEnabled: !Not [!Equals [!Ref IdpMetadataUrl, ""]]
  # Use the explicit domain prefix when supplied, else a deterministic default.
  HasDomainPrefix: !Not [!Equals [!Ref UserPoolDomainPrefix, ""]]

Resources:
  AgentKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "HCLS ${Environment} per-customer encryption key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAccountAdmin
            Effect: Allow
            Principal: { AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root" }
            Action: "kms:*"
            Resource: "*"

  AgentKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/hcls-${Environment}"
      TargetKeyId: !Ref AgentKmsKey

  # Bedrock Guardrail: PHI filtering, denied topics (off-label promotion), and a
  # contextual grounding check on model output. REQUIRED in production.
  BedrockGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub "hcls-${Environment}-guardrail"
      Description: HCLS PHI + off-label + grounding controls
      BlockedInputMessaging: "This request cannot be processed under the HCLS safety policy."
      BlockedOutputsMessaging: "This content was withheld by the HCLS safety policy."
      ContentPolicyConfig:
        FiltersConfig:
          - { Type: PROMPT_ATTACK, InputStrength: HIGH, OutputStrength: NONE }
          - { Type: MISCONDUCT, InputStrength: HIGH, OutputStrength: HIGH }
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - { Type: EMAIL, Action: ANONYMIZE }
          - { Type: PHONE, Action: ANONYMIZE }
          - { Type: US_SOCIAL_SECURITY_NUMBER, Action: BLOCK }
          - { Type: NAME, Action: ANONYMIZE }
      TopicPolicyConfig:
        TopicsConfig:
          - Name: OffLabelPromotion
            Definition: >
              Promotion of a product for an unapproved indication, or absolute
              efficacy/safety claims (cure, guarantee, completely safe).
            Type: DENY
            Examples:
              - "This drug cures the disease in all patients."
              - "Completely safe with no side effects."

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "hcls-${Environment}-users"
      MfaConfiguration: "ON"
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      Schema:
        - { Name: hcls_role, AttributeDataType: String, Mutable: true }
      AdminCreateUserConfig: { AllowAdminCreateUserOnly: true }

  # F6 — External (customer) identity provider. SAML via the customer metadata
  # URL. Created only when FederationEnabled. AttributeMapping carries the
  # IdP-asserted email and the group/role claim into Cognito: the role claim
  # lands in custom:hcls_role, which the gateway authorizer reads to decide who
  # may approve. OIDC is an accepted alternative — see the runbook for the
  # ProviderType/ProviderDetails swap.
  CustomerIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: FederationEnabled
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ProviderName: CustomerIdP
      ProviderType: SAML
      ProviderDetails:
        MetadataURL: !Ref IdpMetadataUrl
        IDPSignout: "true"
      AttributeMapping:
        email: "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress"
        "custom:hcls_role": "http://schemas.xmlsoap.org/claims/Group"

  # Hosted-UI domain — the federated sign-in entry point and the OAuth
  # callback/logout origin. Created only when federation is enabled.
  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: FederationEnabled
    Properties:
      Domain: !If
        - HasDomainPrefix
        - !Ref UserPoolDomainPrefix
        - !Sub "hcls-${Environment}-${AWS::AccountId}"
      UserPoolId: !Ref CognitoUserPool

  # App client — the JWT audience for the portable gateway authorizer and the
  # token client for the reviewer UI. When federation is enabled the client adds
  # the external IdP to SupportedIdentityProviders and registers the OAuth
  # code-flow callback/logout URLs; otherwise it stays native-Cognito only so
  # dev deploys unchanged.
  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "hcls-${Environment}-app"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      SupportedIdentityProviders: !If
        - FederationEnabled
        - [COGNITO, CustomerIdP]
        - [COGNITO]
      CallbackURLs: !If
        - FederationEnabled
        - [!Ref CallbackUrl]
        - !Ref "AWS::NoValue"
      LogoutURLs: !If
        - FederationEnabled
        - [!Ref CallbackUrl]
        - !Ref "AWS::NoValue"

  AgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "hcls-${Environment}-agent-exec"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: [ecs-tasks.amazonaws.com, lambda.amazonaws.com] }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: hcls-agent-least-privilege
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # --- Inference: in-account Bedrock + Guardrail on every call ---
              # round-2 #9: scoped off Resource:"*" — InvokeModel to foundation models
              # in-region, ApplyGuardrail to THIS guardrail only.
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}::foundation-model/*"
              - Effect: Allow
                Action: [bedrock:ApplyGuardrail]
                Resource: !GetAtt BedrockGuardrail.GuardrailArn
              # --- Credentials for live systems of record (hcls/ prefix only) ---
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:hcls/*"
              # --- Envelope encryption for audit/review/WORM data ---
              - Effect: Allow
                Action: [kms:Decrypt, kms:GenerateDataKey]
                Resource: !GetAtt AgentKmsKey.Arn
              # --- Audit + review tables: the HITL-notify and finalize Lambdas
              #     write the task token, draft, and append-only audit entries.
              #     Without this the native workflow fails at the human gate. ---
              # F5: append-only. NO UpdateItem / DeleteItem / BatchWriteItem on the
              # audit or review tables — the trail is immutable at the IAM layer, and
              # the writer additionally uses a conditional PutItem so a record can
              # never be overwritten in place.
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/hcls-${Environment}-audit"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/hcls-${Environment}-review"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/hcls-${Environment}-*/index/*"
              # --- Finalized regulated artifacts to the WORM (Object Lock) store ---
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource: !Sub "arn:aws:s3:::hcls-${Environment}-regulated-${AWS::AccountId}/*"
              # --- Invoke the connector target Lambdas (the gateway assumes this
              #     role to reach each system-of-record target) ---
              - Effect: Allow
                Action: [lambda:InvokeFunction]
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:hcls-${Environment}-connector-*"
              # --- Human gate callbacks: approve/reject resumes the workflow ---
              - Effect: Allow
                Action:
                  - states:SendTaskSuccess
                  - states:SendTaskFailure
                  - states:SendTaskHeartbeat
                Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:hcls-${Environment}-*"
              # --- CloudWatch Logs for every Lambda / task in the suite ---
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/hcls-${Environment}-*:*"
              # --- F7: VPC attachment. Lambdas run in the private subnets, so the
              #     execution role must manage its own ENIs. These EC2 actions do
              #     not support resource-level scoping and are account/region-bound. ---
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource: "*"

  # ── round-2 #9: per-responsibility roles ──────────────────────────────────
  # The canonical golden path (infra/golden-path-*/) already attaches a narrow
  # inline policy PER FUNCTION. For the shared quickstart, these dedicated roles
  # let each Lambda assume only what its job needs instead of the broad agent role:
  #   AuditWriterRole      → audit/review append-only writers (connector, finalize, hitl)
  #   ApprovalServiceRole  → the reviewer service: durable approval-consumption + token secret
  #   WormExporterRole     → finalize: regulated artifacts to the Object-Lock store
  AuditWriterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "hcls-${Environment}-audit-writer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement: [{ Effect: Allow, Principal: { Service: [lambda.amazonaws.com] }, Action: sts:AssumeRole }]
      Policies:
        - PolicyName: audit-append-only
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:GetItem, dynamodb:Query]   # NO Update/Delete/BatchWrite
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/hcls-${Environment}-audit"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/hcls-${Environment}-review"
              - { Effect: Allow, Action: [kms:GenerateDataKey], Resource: !GetAtt AgentKmsKey.Arn }
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/hcls-${Environment}-*:*"

  ApprovalServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "hcls-${Environment}-approval-svc"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement: [{ Effect: Allow, Principal: { Service: [lambda.amazonaws.com] }, Action: sts:AssumeRole }]
      Policies:
        - PolicyName: approval-consumption-and-secret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:GetItem]   # atomic single-use claim
                Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/hcls-${Environment}-approval-consumption"
              - { Effect: Allow, Action: [secretsmanager:GetSecretValue], Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:hcls/approval-*" }
              - { Effect: Allow, Action: [kms:Decrypt, kms:GenerateDataKey], Resource: !GetAtt AgentKmsKey.Arn }
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/hcls-${Environment}-*:*"

  WormExporterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "hcls-${Environment}-worm-exporter"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement: [{ Effect: Allow, Principal: { Service: [lambda.amazonaws.com] }, Action: sts:AssumeRole }]
      Policies:
        - PolicyName: worm-put-only
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - { Effect: Allow, Action: [s3:PutObject], Resource: !Sub "arn:aws:s3:::hcls-${Environment}-regulated-${AWS::AccountId}/*" }
              - { Effect: Allow, Action: [kms:GenerateDataKey], Resource: !GetAtt AgentKmsKey.Arn }

Outputs:
  KmsKeyArn: { Value: !GetAtt AgentKmsKey.Arn, Export: { Name: !Sub "hcls-${Environment}-kms" } }
  GuardrailId: { Value: !Ref BedrockGuardrail, Export: { Name: !Sub "hcls-${Environment}-guardrail" } }
  UserPoolId: { Value: !Ref CognitoUserPool, Export: { Name: !Sub "hcls-${Environment}-userpool" } }
  UserPoolClientId: { Value: !Ref CognitoUserPoolClient, Export: { Name: !Sub "hcls-${Environment}-userpool-client" } }
  FederationEnabled:
    Description: Whether an external customer IdP is wired (true when IdpMetadataUrl was non-empty).
    Value: !If [FederationEnabled, "true", "false"]
  HostedUiDomain:
    Condition: FederationEnabled
    Description: Cognito hosted-UI domain prefix for federated sign-in.
    Value: !Ref CognitoUserPoolDomain
  AgentExecutionRoleArn:
    Value: !GetAtt AgentExecutionRole.Arn
    Export: { Name: !Sub "hcls-${Environment}-agent-role" }
  AuditWriterRoleArn:
    Value: !GetAtt AuditWriterRole.Arn
    Export: { Name: !Sub "hcls-${Environment}-audit-writer-role" }
  ApprovalServiceRoleArn:
    Value: !GetAtt ApprovalServiceRole.Arn
    Export: { Name: !Sub "hcls-${Environment}-approval-svc-role" }
  WormExporterRoleArn:
    Value: !GetAtt WormExporterRole.Arn
    Export: { Name: !Sub "hcls-${Environment}-worm-exporter-role" }
