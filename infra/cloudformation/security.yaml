AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HCLS Agent Suite - Security stack. Per-customer KMS key, Bedrock Guardrail
  (PHI + off-label + grounding controls), Cognito user pool federated to the
  customer IdP, and the agent execution role. These are the controls that make
  the data-residency and Part-11 stories real.

Parameters:
  Environment: { Type: String, Default: dev }
  IdpMetadataUrl:
    Type: String
    Default: ""
    Description: SAML/OIDC metadata URL for the customer IdP (Okta/Entra/AD). Optional in dev.

Resources:
  AgentKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "HCLS ${Environment} per-customer encryption key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAccountAdmin
            Effect: Allow
            Principal: { AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root" }
            Action: "kms:*"
            Resource: "*"

  AgentKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/hcls-${Environment}"
      TargetKeyId: !Ref AgentKmsKey

  # Bedrock Guardrail: PHI filtering, denied topics (off-label promotion), and a
  # contextual grounding check on model output. REQUIRED in production.
  BedrockGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub "hcls-${Environment}-guardrail"
      Description: HCLS PHI + off-label + grounding controls
      BlockedInputMessaging: "This request cannot be processed under the HCLS safety policy."
      BlockedOutputsMessaging: "This content was withheld by the HCLS safety policy."
      ContentPolicyConfig:
        FiltersConfig:
          - { Type: PROMPT_ATTACK, InputStrength: HIGH, OutputStrength: NONE }
          - { Type: MISCONDUCT, InputStrength: HIGH, OutputStrength: HIGH }
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - { Type: EMAIL, Action: ANONYMIZE }
          - { Type: PHONE, Action: ANONYMIZE }
          - { Type: US_SOCIAL_SECURITY_NUMBER, Action: BLOCK }
          - { Type: NAME, Action: ANONYMIZE }
      TopicPolicyConfig:
        TopicsConfig:
          - Name: OffLabelPromotion
            Definition: >
              Promotion of a product for an unapproved indication, or absolute
              efficacy/safety claims (cure, guarantee, completely safe).
            Type: DENY
            Examples:
              - "This drug cures the disease in all patients."
              - "Completely safe with no side effects."

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "hcls-${Environment}-users"
      MfaConfiguration: "ON"
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      Schema:
        - { Name: hcls_role, AttributeDataType: String, Mutable: true }
      AdminCreateUserConfig: { AllowAdminCreateUserOnly: true }

  # App client — the JWT audience for the portable gateway authorizer and the
  # token client for the reviewer UI. Federated sign-in flows through the IdP.
  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "hcls-${Environment}-app"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      SupportedIdentityProviders: [COGNITO]

  AgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "hcls-${Environment}-agent-exec"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: [ecs-tasks.amazonaws.com, lambda.amazonaws.com, bedrock.amazonaws.com] }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: hcls-agent-least-privilege
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # --- Inference: in-account Bedrock + Guardrail on every call ---
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ApplyGuardrail
                Resource: "*"
              # --- Credentials for live systems of record (hcls/ prefix only) ---
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:hcls/*"
              # --- Envelope encryption for audit/review/WORM data ---
              - Effect: Allow
                Action: [kms:Decrypt, kms:GenerateDataKey]
                Resource: !GetAtt AgentKmsKey.Arn
              # --- Audit + review tables: the HITL-notify and finalize Lambdas
              #     write the task token, draft, and append-only audit entries.
              #     Without this the native workflow fails at the human gate. ---
              # F5: append-only. NO UpdateItem / DeleteItem / BatchWriteItem on the
              # audit or review tables — the trail is immutable at the IAM layer, and
              # the writer additionally uses a conditional PutItem so a record can
              # never be overwritten in place.
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/hcls-${Environment}-audit"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/hcls-${Environment}-review"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/hcls-${Environment}-*/index/*"
              # --- Finalized regulated artifacts to the WORM (Object Lock) store ---
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource: !Sub "arn:aws:s3:::hcls-${Environment}-regulated-${AWS::AccountId}/*"
              # --- Invoke the connector target Lambdas (the gateway assumes this
              #     role to reach each system-of-record target) ---
              - Effect: Allow
                Action: [lambda:InvokeFunction]
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:hcls-${Environment}-connector-*"
              # --- Human gate callbacks: approve/reject resumes the workflow ---
              - Effect: Allow
                Action:
                  - states:SendTaskSuccess
                  - states:SendTaskFailure
                  - states:SendTaskHeartbeat
                Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:hcls-${Environment}-*"
              # --- CloudWatch Logs for every Lambda / task in the suite ---
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/hcls-${Environment}-*:*"

Outputs:
  KmsKeyArn: { Value: !GetAtt AgentKmsKey.Arn, Export: { Name: !Sub "hcls-${Environment}-kms" } }
  GuardrailId: { Value: !Ref BedrockGuardrail, Export: { Name: !Sub "hcls-${Environment}-guardrail" } }
  UserPoolId: { Value: !Ref CognitoUserPool, Export: { Name: !Sub "hcls-${Environment}-userpool" } }
  UserPoolClientId: { Value: !Ref CognitoUserPoolClient, Export: { Name: !Sub "hcls-${Environment}-userpool-client" } }
  AgentExecutionRoleArn:
    Value: !GetAtt AgentExecutionRole.Arn
    Export: { Name: !Sub "hcls-${Environment}-agent-role" }
