AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HCLS Agent Suite - Connector Lambdas. One Lambda per system of record, each the
  governed backend behind an MCP gateway *target*. Every call is run through
  platform_core's MCPGateway (deny-by-default, least-privilege intersection,
  human-approval gate, scoped token, append-only audit) so enforcement is the
  tested Python reference, not a re-implementation. Both gateway modes
  (agentcore-gateway.yaml and gateway-portable.yaml) reference these by ARN, so
  this stack deploys FIRST. Shared connector code is at
  aws-native-reference/_shared/connector/ (packaged by scripts/build_lambdas.sh).

Parameters:
  Environment: { Type: String, Default: dev }
  ConnectorCodeBucket: { Type: String, Description: S3 bucket holding connector.zip }
  ConnectorCodeKey: { Type: String, Default: connector.zip }
  AgentExecutionRoleArn: { Type: String }
  AuditTableName: { Type: String, Default: "" }
  ConnectorMode:
    Type: String
    Default: fixture
    AllowedValues: [fixture, live]
    Description: fixture = deterministic demo data; live = real vendor APIs.

# Every distinct connector kind in TOOL_REGISTRY (platform_core/mcp_gateway/policy.py).
# Each becomes one Lambda + one gateway target. Mappings (Fn::FindInMap-free, kept
# explicit for readability) live inline per resource below.
Resources:
  RimConnector:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "hcls-${Environment}-connector-rim"
      Runtime: python3.11
      Handler: handler.handler
      Timeout: 30
      MemorySize: 256
      Role: !Ref AgentExecutionRoleArn
      Environment: { Variables: { CONNECTOR_KIND: rim, CONNECTOR_MODE: !Ref ConnectorMode, AUDIT_TABLE: !Ref AuditTableName, ENVIRONMENT: !Ref Environment } }
      Code: { S3Bucket: !Ref ConnectorCodeBucket, S3Key: !Ref ConnectorCodeKey }

  DmsConnector:
