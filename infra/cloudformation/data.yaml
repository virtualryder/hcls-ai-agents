AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HCLS Agent Suite - Data stack. Append-only audit trail (DynamoDB, tamper-evident
  via an IAM deny on Update/Delete elsewhere), WORM document store (S3 Object Lock,
  for finalized regulated artifacts), and the HITL review table. 21 CFR Part 11
  record-integrity controls.

Parameters:
  Environment: { Type: String, Default: dev }
  KmsKeyArn: { Type: String }
  RetentionYears: { Type: Number, Default: 7 }
  RetentionMode:
    Type: String
    Default: COMPLIANCE
    AllowedValues: [COMPLIANCE, GOVERNANCE]
    Description: >
      S3 Object Lock retention mode for the WORM evidence store. COMPLIANCE (recommended for
      regulated production) cannot be shortened or bypassed by anyone, including root. GOVERNANCE
      (acceptable for pilots) can be bypassed only with s3:BypassGovernanceRetention — which the
      bucket policy DENIES for everyone except the break-glass role below.
  BreakGlassRoleArn:
    Type: String
    Default: ""
    Description: >
      Optional ARN of the single break-glass role permitted to bypass GOVERNANCE-mode retention
      (MFA + second-approver + time-boxed + alarmed — see docs/KEY-MANAGEMENT.md / RETENTION-MODES.md).
      Empty (default) = NO principal may bypass governance retention.

Resources:
  AuditTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "hcls-${Environment}-audit"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: audit_id, AttributeType: S }
        - { AttributeName: ts, AttributeType: S }
      KeySchema:
        - { AttributeName: audit_id, KeyType: HASH }
        - { AttributeName: ts, KeyType: RANGE }
      SSESpecification: { SSEEnabled: true, SSEType: KMS, KMSMasterKeyId: !Ref KmsKeyArn }
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }

  ReviewTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "hcls-${Environment}-review"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: approval_id, AttributeType: S }]
      KeySchema: [{ AttributeName: approval_id, KeyType: HASH }]
      SSESpecification: { SSEEnabled: true, SSEType: KMS, KMSMasterKeyId: !Ref KmsKeyArn }
      TimeToLiveSpecification: { AttributeName: ttl, Enabled: true }

  WormBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "hcls-${Environment}-regulated-${AWS::AccountId}"
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention: { Mode: !Ref RetentionMode, Years: !Ref RetentionYears }
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: aws:kms, KMSMasterKeyID: !Ref KmsKeyArn }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration: { Status: Enabled }

  # Governance-bypass control: deny s3:BypassGovernanceRetention (and locked-version deletion) for
  # everyone except an optional break-glass role. COMPLIANCE mode already forbids bypass entirely;
  # this makes the control explicit and also protects a GOVERNANCE-mode pilot. Enable CloudTrail S3
  # data events on this bucket at the account level (see RETENTION-MODES.md) to log any attempt.
  WormBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WormBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyGovernanceRetentionBypassExceptBreakGlass
            Effect: Deny
            Principal: "*"
            Action: [s3:BypassGovernanceRetention, s3:DeleteObjectVersion]
            Resource: !Sub "${WormBucket.Arn}/*"
            Condition:
              StringNotEquals:
                aws:PrincipalArn: !Ref BreakGlassRoleArn
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt WormBucket.Arn
              - !Sub "${WormBucket.Arn}/*"
            Condition:
              Bool: { "aws:SecureTransport": false }

Outputs:
  AuditTableName: { Value: !Ref AuditTable, Export: { Name: !Sub "hcls-${Environment}-audit-table" } }
  ReviewTableName: { Value: !Ref ReviewTable, Export: { Name: !Sub "hcls-${Environment}-review-table" } }
  WormBucketName: { Value: !Ref WormBucket, Export: { Name: !Sub "hcls-${Environment}-worm-bucket" } }
