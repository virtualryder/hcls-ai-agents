[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "streamlit run app.py --server.port=$PORT --server.address=0.0.0.0"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Set EXTRACT_MODE=demo for a no-API-key showcase, or provide ANTHROPIC_API_KEY
# (or Bedrock env) for live narrative drafting. CONNECTOR_MODE=fixture keeps
# safety DB, MedDRA, and WHODrug connectors offline.
