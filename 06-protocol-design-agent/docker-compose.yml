services:
  protocol-design-agent:
    build: .
    ports:
      - "8506:8501"
    environment:
      - EXTRACT_MODE=${EXTRACT_MODE:-demo}
      - CONNECTOR_MODE=${CONNECTOR_MODE:-fixture}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ../platform_core:/platform_core:ro
      - ../governance:/governance:ro
