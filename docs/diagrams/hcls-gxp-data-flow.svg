<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="aO" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#FF9900"/></marker>
    <marker id="aT" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#01A88D"/></marker>
    <marker id="aR" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#DD344C"/></marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>
  <text x="48" y="38" font-size="22" font-weight="bold" fill="#232F3E">HCLS AI Agent Suite — GxP Data Flow (21 CFR Part 11 · Annex 11)</text>

  <!-- Row A: systems of record connectors -->
  <rect x="48" y="100" width="300" height="76" rx="8" fill="#232F3E"/>
  <text x="198" y="132" font-size="14" fill="#FFFFFF" text-anchor="middle">Veeva Vault</text>
  <text x="198" y="150" font-size="14" fill="#FFFFFF" text-anchor="middle">RIM · QualityDocs connector</text>

  <rect x="388" y="100" width="300" height="76" rx="8" fill="#232F3E"/>
  <text x="538" y="132" font-size="14" fill="#FFFFFF" text-anchor="middle">Oracle Argus Safety</text>
  <text x="538" y="150" font-size="14" fill="#FFFFFF" text-anchor="middle">PV case connector</text>

  <rect x="728" y="100" width="300" height="76" rx="8" fill="#232F3E"/>
  <text x="878" y="132" font-size="14" fill="#FFFFFF" text-anchor="middle">Medidata Rave / EDC</text>
  <text x="878" y="150" font-size="14" fill="#FFFFFF" text-anchor="middle">clinical data connector</text>

  <rect x="1068" y="100" width="284" height="76" rx="8" fill="#FFFFFF" stroke="#545B64" stroke-width="1.5"/>
  <text x="1210" y="132" font-size="13" fill="#232F3E" text-anchor="middle">Validated, read-scoped</text>
  <text x="1210" y="150" font-size="13" fill="#232F3E" text-anchor="middle">connectors — allow-listed</text>

  <line x1="198" y1="176" x2="198" y2="244" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <line x1="538" y1="176" x2="538" y2="244" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <line x1="878" y1="176" x2="878" y2="244" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>

  <!-- Row B: gateway -->
  <rect x="48" y="250" width="950" height="130" rx="8" fill="#232F3E"/>
  <text x="64" y="278" font-size="15" font-weight="bold" fill="#FFFFFF">MCP Authorization Gateway — deny-by-default · draft-only agents</text>
  <rect x="64" y="292" width="150" height="30" rx="6" fill="#FFFFFF"/>
  <text x="139" y="311" font-size="11" fill="#232F3E" text-anchor="middle">Deny-by-default</text>
  <rect x="222" y="292" width="170" height="30" rx="6" fill="#FFFFFF"/>
  <text x="307" y="311" font-size="11" fill="#232F3E" text-anchor="middle">Scoped per-call tokens</text>
  <rect x="400" y="292" width="160" height="30" rx="6" fill="#FFFFFF"/>
  <text x="480" y="311" font-size="11" fill="#232F3E" text-anchor="middle">Connector allow-list</text>
  <rect x="568" y="292" width="160" height="30" rx="6" fill="#FFFFFF"/>
  <text x="648" y="311" font-size="11" fill="#232F3E" text-anchor="middle">Append-only audit</text>
  <rect x="64" y="330" width="300" height="30" rx="6" fill="#FF9900"/>
  <text x="214" y="349" font-size="11" font-weight="bold" fill="#232F3E" text-anchor="middle">PII/PHI masking before any model call</text>
  <rect x="372" y="330" width="300" height="30" rx="6" fill="#FF9900"/>
  <text x="522" y="349" font-size="11" font-weight="bold" fill="#232F3E" text-anchor="middle">No autonomous submission — draft only</text>

  <!-- HITL note -->
  <rect x="1048" y="250" width="304" height="130" rx="8" fill="#01A88D"/>
  <text x="1200" y="280" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Human-in-the-loop</text>
  <text x="1200" y="302" font-size="13" fill="#FFFFFF" text-anchor="middle">no agent submits to a health</text>
  <text x="1200" y="320" font-size="13" fill="#FFFFFF" text-anchor="middle">authority, QMS, or safety system —</text>
  <text x="1200" y="338" font-size="13" fill="#FFFFFF" text-anchor="middle">a named human signs first</text>
  <line x1="998" y1="315" x2="1042" y2="315" stroke="#01A88D" stroke-width="2" marker-end="url(#aT)"/>

  <!-- Deny note -->
  <line x1="670" y1="380" x2="670" y2="402" stroke="#DD344C" stroke-width="2" marker-end="url(#aR)"/>
  <rect x="470" y="406" width="430" height="36" rx="8" fill="#FFFFFF" stroke="#DD344C" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="685" y="429" font-size="12" font-weight="bold" fill="#DD344C" text-anchor="middle">× Unvalidated connector or out-of-scope tool → DENY (fail closed)</text>

  <!-- Row C: drafting agents + model -->
  <line x1="198" y1="380" x2="198" y2="464" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <rect x="48" y="470" width="300" height="90" rx="8" fill="#232F3E"/>
  <text x="198" y="500" font-size="14" fill="#FFFFFF" text-anchor="middle">Drafting agents</text>
  <text x="198" y="518" font-size="14" fill="#FFFFFF" text-anchor="middle">reg writing · PV narratives</text>
  <text x="198" y="536" font-size="14" fill="#FFFFFF" text-anchor="middle">· batch-record review</text>

  <rect x="398" y="452" width="560" height="112" rx="8" fill="none" stroke="#232F3E" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="414" y="466" font-size="11" font-weight="bold" fill="#545B64">AWS PRIVATELINK / VPC ENDPOINT BOUNDARY</text>
  <rect x="418" y="478" width="380" height="76" rx="8" fill="#232F3E"/>
  <text x="608" y="498" font-size="14" fill="#FFFFFF" text-anchor="middle">Amazon Bedrock (Claude)</text>
  <text x="608" y="516" font-size="14" fill="#FFFFFF" text-anchor="middle">+ Bedrock Guardrails</text>
  <text x="608" y="534" font-size="14" fill="#FFFFFF" text-anchor="middle">grounded drafting only</text>
  <line x1="348" y1="516" x2="412" y2="516" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>

  <text x="398" y="588" font-size="12.5" font-style="italic" fill="#545B64">Regional AWS service reached over private networking —</text>
  <text x="398" y="606" font-size="12.5" font-style="italic" fill="#545B64">no egress to external AI APIs.</text>

  <!-- Row D: e-signature gate -->
  <line x1="198" y1="560" x2="198" y2="624" stroke="#01A88D" stroke-width="2" marker-end="url(#aT)"/>
  <rect x="48" y="630" width="950" height="76" rx="8" fill="#01A88D"/>
  <text x="523" y="661" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Named-human e-signature gate — 21 CFR Part 11</text>
  <text x="523" y="684" font-size="13" fill="#FFFFFF" text-anchor="middle">unique user ID · date/time stamp · meaning of signature · signature linked to the electronic record</text>

  <!-- Row E: evidence -->
  <line x1="218" y1="706" x2="218" y2="744" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>

  <rect x="48" y="750" width="340" height="76" rx="8" fill="#232F3E"/>
  <text x="218" y="782" font-size="14" fill="#FFFFFF" text-anchor="middle">Amazon DynamoDB — append-only</text>
  <text x="218" y="800" font-size="14" fill="#FFFFFF" text-anchor="middle">audit + signature manifest</text>

  <rect x="428" y="750" width="340" height="76" rx="8" fill="#232F3E"/>
  <text x="598" y="782" font-size="14" fill="#FFFFFF" text-anchor="middle">Amazon S3 Object Lock</text>
  <text x="598" y="800" font-size="14" fill="#FFFFFF" text-anchor="middle">WORM — versioned record retention</text>

  <rect x="808" y="750" width="380" height="76" rx="8" fill="#232F3E"/>
  <text x="998" y="782" font-size="14" fill="#FFFFFF" text-anchor="middle">AWS KMS — customer-managed CMK</text>
  <text x="998" y="800" font-size="14" fill="#FFFFFF" text-anchor="middle">GxP data class</text>

  <text x="48" y="870" font-size="13" fill="#545B64">Cross-cutting: AWS CloudTrail · GuardDuty · Security Hub · AWS Config · audit trail supports 21 CFR Part 11 / Annex 11 data-integrity (ALCOA+) review</text>
</svg>
