l, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Base models</text><text x="16" y="192" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Model access</text><rect x="0" y="206" width="210" height="30" fill="#F1FAFF" rx="0"/><rect x="0" y="206" width="3" height="30" fill="#0073BB" rx="0"/><text x="16" y="226" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0073BB" font-weight="700" text-anchor="start">Guardrails</text><text x="16" y="260" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Playgrounds</text><rect x="230" y="110" width="726" height="300" fill="#FFFFFF" rx="6" stroke="#D5DBDB" stroke-width="1"/><text x="248" y="138" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#16191F" font-weight="700" text-anchor="start">Create guardrail</text><text x="248" y="142" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F6B7A" font-weight="700" text-anchor="start">Guardrail name</text><rect x="248" y="150" width="330" height="34" fill="#FFFFFF" rx="4" stroke="#D5DBDB" stroke-width="1"/><text x="258" y="172.0" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">hcls-dev-guardrail</text><text x="248" y="215" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F" font-weight="700" text-anchor="start">Sensitive information filter (PII)</text><rect x="248" y="228" width="690" height="28" fill="#F7FAFC" rx="4" stroke="#D5DBDB" stroke-width="1"/><text x="260" y="246" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">US Social Security Number</text><text x="836" y="246" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#D13212" font-weight="700" text-anchor="start">Block</text><rect x="248" y="262" width="690" height="28" fill="#F7FAFC" rx="4" stroke="#D5DBDB" stroke-width="1"/><text x="260" y="280" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Email / Name / Phone</text><text x="836" y="280" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0073BB" font-weight="700" text-anchor="start">Anonymize</text><text x="248" y="320" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F" font-weight="700" text-anchor="start">Denied topic</text><rect x="248" y="330" width="690" height="40" fill="#FFF8F0" rx="4" stroke="#F0C36D" stroke-width="1"/><text x="260" y="348" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#16191F"  text-anchor="start">OffLabelPromotion — promotion for an unapproved indication or absolute</text><text x="260" y="364" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#16191F"  text-anchor="start">efficacy/safety claims (cure, guarantee, completely safe).</text><rect x="696" y="395" width="120" height="34" rx="4" fill="#FFFFFF" stroke="#D5DBDB" stroke-width="1"/><text x="756.0" y="417.0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#16191F" font-weight="700" text-anchor="middle">Create version</text><rect x="826" y="395" width="130" height="34" rx="4" fill="#EC7211"/><text x="891.0" y="417.0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="700" text-anchor="middle">Create guardrail</text><circle cx="248" cy="150" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="248" y="155" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">1</text><circle cx="248" cy="222" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="248" y="227" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">2</text><circle cx="248" cy="330" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="248" y="335" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">3</text><circle cx="826" cy="412" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="826" y="417" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">4</text><rect x="981" y="48" width="339" height="712" fill="#FBFBFC" rx="0" stroke="#D5DBDB" stroke-width="1"/><text x="999" y="80" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#EC7211" font-weight="700" text-anchor="start">STEPS</text><text x="999" y="104" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#16191F" font-weight="700" text-anchor="start">Phase 3.2 — Create the Guardrail</text><circle cx="1011" cy="140" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="145" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">1</text><text x="1033" y="136" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Name the guardrail</text><text x="1033" y="152" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">hcls-dev-guardrail.</text><circle cx="1011" cy="192" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="197" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">2</text><text x="1033" y="188" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Add PII filters: SSN -&gt; Block;</text><text x="1033" y="204" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Email/Name/Phone -&gt; Anonymize.</text><circle cx="1011" cy="244" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="249" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">3</text><text x="1033" y="240" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Add a denied topic</text><text x="1033" y="256" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">OffLabelPromotion to block</text><text x="1033" y="272" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">off-label/absolute claims.</text><circle cx="1011" cy="312" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="317" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">4</text><text x="1033" y="308" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Create, then Create version.</text><text x="1033" y="324" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Record the Guardrail ID + version.</text><text x="999" y="740" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5F6B7A"  text-anchor="start">Illustrative mockup — not an actual AWS screenshot</text></svg>