<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760"><rect x="0" y="0" width="1320" height="760" fill="#F2F3F3" rx="0"/><rect x="0" y="0" width="1320" height="48" fill="#232F3E" rx="0"/><rect x="14" y="11" width="26" height="26" fill="#FF9900" rx="4"/><text x="20" y="29" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#232F3E" font-weight="700" text-anchor="start">a</text><text x="50" y="30" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="700" text-anchor="start">Services</text><rect x="150" y="10" width="360" height="28" fill="#FFFFFF" rx="4"/><text x="165" y="29" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#879596"  text-anchor="start">Search [ Alt+S ]</text><rect x="1020" y="10" width="150" height="28" fill="#1B2531" rx="4" stroke="#3A4654" stroke-width="1"/><text x="1028" y="29" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#D5DBDB"  text-anchor="start">N. Virginia  us-east-1</text><rect x="1180" y="10" width="120" height="28" fill="#1B2531" rx="4" stroke="#3A4654" stroke-width="1"/><text x="1188" y="29" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#D5DBDB"  text-anchor="start">acme-pharma / dev</text><rect x="0" y="48" width="980" height="46" fill="#FFFFFF" rx="0" stroke="#D5DBDB" stroke-width="1"/><text x="24" y="78" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#16191F" font-weight="700" text-anchor="start">AWS Secrets Manager</text><text x="960" y="76" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F6B7A"  text-anchor="end">Secrets Manager &gt; Store a new secret</text><rect x="0" y="94" width="210" height="666" fill="#FAFAFA" rx="0" stroke="#D5DBDB" stroke-width="1"/><text x="16" y="124" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Secrets</text><rect x="0" y="138" width="210" height="30" fill="#F1FAFF" rx="0"/><rect x="0" y="138" width="3" height="30" fill="#0073BB" rx="0"/><text x="16" y="158" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0073BB" font-weight="700" text-anchor="start">Store a new secret</text><text x="16" y="192" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Rotation</text><text x="16" y="226" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Replication</text><rect x="230" y="110" width="726" height="290" fill="#FFFFFF" rx="6" stroke="#D5DBDB" stroke-width="1"/><text x="248" y="138" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#16191F" font-weight="700" text-anchor="start">Store a new secret</text><text x="248" y="150" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F" font-weight="700" text-anchor="start">Secret type</text><rect x="248" y="162" width="200" height="30" fill="#F1FAFF" rx="4" stroke="#0073BB" stroke-width="1"/><text x="264" y="182" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0073BB" font-weight="700" text-anchor="start">Other type of secret</text><text x="248" y="228" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F" font-weight="700" text-anchor="start">Key / value</text><rect x="248" y="240" width="260" height="32" fill="#FFFFFF" rx="4" stroke="#D5DBDB" stroke-width="1"/><text x="260" y="260" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">edc_api_token</text><rect x="516" y="240" width="404" height="32" fill="#FFFFFF" rx="4" stroke="#D5DBDB" stroke-width="1"/><text x="528" y="260" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5F6B7A"  text-anchor="start">••••••••••  (EDC API token)</text><text x="248" y="300" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F6B7A" font-weight="700" text-anchor="start">Secret name</text><rect x="248" y="308" width="690" height="34" fill="#FFFFFF" rx="4" stroke="#D5DBDB" stroke-width="1"/><text x="258" y="330.0" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">hcls/edc_api_token</text><text x="248" y="372" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#5F6B7A"  text-anchor="start">The hcls/ prefix is what get_secret() resolves; the agent IAM role has GetSecretValue on hcls/*.</text><rect x="836" y="372" width="120" height="34" rx="4" fill="#EC7211"/><text x="896.0" y="394.0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="700" text-anchor="middle">Store</text><circle cx="248" cy="177" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="248" y="182" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">1</text><circle cx="248" cy="256" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="248" y="261" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">2</text><circle cx="248" cy="308" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="248" y="313" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">3</text><circle cx="836" cy="389" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="836" y="394" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">4</text><rect x="981" y="48" width="339" height="712" fill="#FBFBFC" rx="0" stroke="#D5DBDB" stroke-width="1"/><text x="999" y="80" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#EC7211" font-weight="700" text-anchor="start">STEPS</text><text x="999" y="104" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#16191F" font-weight="700" text-anchor="start">Phase 7 — Store the system credential</text><circle cx="1011" cy="140" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="145" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">1</text><text x="1033" y="136" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Choose Other type of secret.</text><circle cx="1011" cy="176" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="181" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">2</text><text x="1033" y="172" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Add key edc_api_token = the EDC</text><text x="1033" y="188" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">API token.</text><circle cx="1011" cy="228" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="233" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">3</text><text x="1033" y="224" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Name the secret hcls/edc_api_token</text><text x="1033" y="240" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">(the hcls/ prefix matters).</text><circle cx="1011" cy="280" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="285" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">4</text><text x="1033" y="276" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Store. The agent role has</text><text x="1033" y="292" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">GetSecretValue on hcls/*.</text><text x="999" y="740" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5F6B7A"  text-anchor="start">Illustrative mockup — not an actual AWS screenshot</text></svg>