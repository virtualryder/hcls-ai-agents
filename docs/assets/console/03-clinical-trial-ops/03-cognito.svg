ill="#232F3E" text-anchor="middle">4</text><rect x="981" y="48" width="339" height="712" fill="#FBFBFC" rx="0" stroke="#D5DBDB" stroke-width="1"/><text x="999" y="80" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#EC7211" font-weight="700" text-anchor="start">STEPS</text><text x="999" y="104" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#16191F" font-weight="700" text-anchor="start">Phase 3.3 — Federate the IdP</text><circle cx="1011" cy="140" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="145" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">1</text><text x="1033" y="136" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Choose SAML (or OIDC) as the</text><text x="1033" y="152" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">federated identity provider.</text><circle cx="1011" cy="192" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="197" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">2</text><text x="1033" y="188" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Paste the customer IdP metadata</text><text x="1033" y="204" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">document URL.</text><circle cx="1011" cy="244" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="249" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">3</text><text x="1033" y="240" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Map GRP-CLINOPS-LEAD to</text><text x="1033" y="256" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">custom:hcls_role = CLINOPS_LEAD.</text><circle cx="1011" cy="296" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="301" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">4</text><text x="1033" y="292" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Add provider; provisioning a user</text><text x="1033" y="308" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">= adding them to the IdP group.</text><text x="999" y="740" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5F6B7A"  text-anchor="start">Illustrative mockup — not an actual AWS screenshot</text></svg>