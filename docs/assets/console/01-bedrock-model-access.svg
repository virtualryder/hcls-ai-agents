rif" font-size="13" fill="#16191F"  text-anchor="start">Base models</text><rect x="0" y="172" width="210" height="30" fill="#F1FAFF" rx="0"/><rect x="0" y="172" width="3" height="30" fill="#0073BB" rx="0"/><text x="16" y="192" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0073BB" font-weight="700" text-anchor="start">Model access</text><text x="16" y="226" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Guardrails</text><text x="16" y="260" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Playgrounds</text><rect x="230" y="110" width="726" height="250" fill="#FFFFFF" rx="6" stroke="#D5DBDB" stroke-width="1"/><text x="248" y="138" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#16191F" font-weight="700" text-anchor="start">Model access</text><text x="248" y="158" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5F6B7A"  text-anchor="start">Anthropic models — enable the tiers the agents use, then Save.</text><rect x="248" y="185" width="690" height="28" fill="#F2F3F3" rx="4"/><text x="258" y="203" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F6B7A" font-weight="700" text-anchor="start">Model</text><text x="836" y="203" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F6B7A" font-weight="700" text-anchor="start">Access status</text><rect x="258" y="219" width="18" height="18" fill="#EC7211" rx="3" stroke="#EC7211" stroke-width="1.5"/><path d="M 262 228 l 3 4 l 7 -8" stroke="#FFFFFF" stroke-width="2.5" fill="none"/><text x="288" y="232" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Claude Sonnet (narrative tier)</text><text x="836" y="232" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1D8102"  text-anchor="start">Access granted</text><rect x="258" y="253" width="18" height="18" fill="#EC7211" rx="3" stroke="#EC7211" stroke-width="1.5"/><path d="M 262 262 l 3 4 l 7 -8" stroke="#FFFFFF" stroke-width="2.5" fill="none"/><text x="288" y="266" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Claude Haiku (fast tier)</text><text x="836" y="266" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1D8102"  text-anchor="start">Access granted</text><rect x="258" y="287" width="18" height="18" fill="#FFFFFF" rx="3" stroke="#879596" stroke-width="1.5"/><text x="288" y="300" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16191F"  text-anchor="start">Titan Text</text><text x="836" y="300" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F6B7A"  text-anchor="start">Available to request</text><rect x="806" y="330" width="150" height="34" rx="4" fill="#EC7211"/><text x="881.0" y="352.0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="700" text-anchor="middle">Save changes</text><circle cx="1140" cy="30" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1140" y="35" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">1</text><circle cx="120" cy="140" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="120" y="145" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">2</text><circle cx="258" cy="219" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="258" y="224" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">3</text><circle cx="806" cy="347" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="806" y="352" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">4</text><rect x="981" y="48" width="339" height="712" fill="#FBFBFC" rx="0" stroke="#D5DBDB" stroke-width="1"/><text x="999" y="80" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#EC7211" font-weight="700" text-anchor="start">STEPS</text><text x="999" y="104" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#16191F" font-weight="700" text-anchor="start">Phase 3.1 — Enable model access</text><circle cx="1011" cy="140" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="145" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">1</text><text x="1033" y="136" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Set the Region (top-right) to an</text><text x="1033" y="152" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">AgentCore-enabled Region, e.g.</text><text x="1033" y="168" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">us-east-1.</text><circle cx="1011" cy="208" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="213" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">2</text><text x="1033" y="204" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Left nav: open Model access, then</text><text x="1033" y="220" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Manage model access.</text><circle cx="1011" cy="260" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="265" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">3</text><text x="1033" y="256" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Check the Anthropic Claude</text><text x="1033" y="272" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">narrative + fast tiers.</text><circle cx="1011" cy="312" r="15" fill="#FF9900" stroke="#FFFFFF" stroke-width="2"/><text x="1011" y="317" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#232F3E" text-anchor="middle">4</text><text x="1033" y="308" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">Save changes; wait for status to</text><text x="1033" y="324" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#16191F"  text-anchor="start">read Access granted.</text><text x="999" y="740" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5F6B7A"  text-anchor="start">Illustrative mockup — not an actual AWS screenshot</text></svg>