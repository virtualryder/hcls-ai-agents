[pytest]
addopts = -q
# A bare `pytest` runs the shared control-plane suite (always isolation-safe).
# The FULL suite (all 9 agents + 9 native rebuilds, which reuse the `agent`/`tools`/`core`
# package names) is run per-process by `make test` / `scripts/run_all_tests.sh`.
testpaths = platform_core/tests governance/tests
markers =
    integration: requires a deployed AWS golden-path stack (set HCLS_STACK); skipped in the offline suite
