name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# Demo mode: deterministic, no API key, fixtures. No secrets required.
env:
  EXTRACT_MODE: demo
  CONNECTOR_MODE: fixture
  PYTHONPATH: platform_core:.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e platform_core
          pip install pytest "langgraph>=0.2" "langchain-core>=0.3"

      - name: Platform + governance tests
        run: pytest platform_core/tests governance/tests -q

      - name: Agent tests (each in its own process — duplicate package names)
        run: |
          set -e
          for d in [0-9][0-9]-*; do
            echo "== $d =="
            pytest "$d/tests" -q -p no:cacheprovider
          done

      - name: AWS-native reference tests
        run: |
          set -e
          for d in aws-native-reference/[0-9][0-9]-*; do
            echo "== $d =="
            pytest "$d/tests" -q -p no:cacheprovider || true
          done

      - name: Prompt manifest drift check (model change-control)
        run: python -m governance.prompt_registry || true

  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile all Python (catch syntax errors)
        run: python -m compileall -q platform_core governance [0-9][0-9]-* aws-native-reference

  decks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deck tooling
        run: npm install --no-audit --no-fund
      - name: Syntax-check deck generators
        run: |
          node -c decks/build-agent-decks.js
          node -c decks/build-cio-deck.js
      - name: Generate agent + overview decks (smoke)
        run: node decks/build-agent-decks.js

  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint CloudFormation templates
        run: |
          pip install cfn-lint
          # Reference/accelerator templates: lint for syntax; warnings allowed.
          cfn-lint infra/cloudformation/*.yaml || true
