name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# Demo mode: deterministic, no API key, fixtures. No secrets required.
env:
  EXTRACT_MODE: demo
  CONNECTOR_MODE: fixture
  PYTHONPATH: platform_core:.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e platform_core
          pip install pytest "langgraph>=0.2" "langchain-core>=0.3"

      - name: Full suite (all agents + native, one command)
        run: bash scripts/run_all_tests.sh

      - name: Platform + governance tests (shared suite)
        run: pytest platform_core/tests governance/tests -q

      - name: Agent tests (each in its own process — duplicate package names)
        run: |
          set -e
          for d in [0-9][0-9]-*; do
            echo "== $d =="
            pytest "$d/tests" -q -p no:cacheprovider
          done

      - name: AWS-native reference tests
        run: |
          set -e
          for d in aws-native-reference/[0-9][0-9]-*; do
            echo "== $d =="
            pytest "$d/tests" -q -p no:cacheprovider
          done

      - name: Prompt manifest drift check (model change-control)
        run: python -m governance.prompt_registry

  evals:
    # Build B — scored output-quality gate for Agent 02 (Pharmacovigilance).
    # Runs the labeled safety benchmark against regulatory thresholds (seriousness
    # recall, entity F1, duplicate accuracy, grounding, PHI-leak = 0, E2B
    # completeness). Deterministic, no API key. Fails the build on regression;
    # publishes eval-report.md as an artifact for the assurance packet.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e platform_core
          pip install pytest
      - name: Scored eval — Agent 02 (gate on thresholds)
        run: PYTHONPATH=platform_core:. python -m governance.evals.score_agent02
      - name: Scored eval tests (gate + negative controls)
        run: PYTHONPATH=platform_core:. pytest governance/evals -q -p no:cacheprovider
      - name: Publish eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent02-eval-report
          path: governance/evals/eval-report.md
          if-no-files-found: warn

  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile all Python (catch syntax errors)
        run: python -m compileall -q platform_core governance [0-9][0-9]-* aws-native-reference

  decks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deck tooling
        run: npm install --no-audit --no-fund
      - name: Syntax-check deck generators
        run: |
          node -c decks/build-agent-decks.js
          node -c decks/build-cio-deck.js
      - name: Generate agent + overview decks (smoke)
        run: node decks/build-agent-decks.js

  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint CloudFormation templates
        run: |
          pip install cfn-lint
          # Fail the build on E-level findings; style warnings (W) do not block.
          cfn-lint infra/cloudformation/*.yaml infra/golden-path-*/template.yaml --non-zero-exit-code error

  supply-chain:
    runs-on: ubuntu-latest
    # round-2 #11: secret scan, SAST, dependency (SCA), IaC, SBOM, provenance.
    # Findings fail the build (fail-closed); SBOM + scan reports are uploaded as artifacts.
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST (bandit)
        run: |
          pip install bandit==1.9.4
          bandit -r platform_core governance aws-native-reference services -ll -b .bandit-baseline.json --skip B101

      - name: Dependency audit (pip-audit / SCA) — BLOCKING
        run: |
          set -e
          pip install pip-audit
          # Pinned lockfile is authoritative; a CVE now fails the job (was advisory).
          pip-audit --progress-spinner off -r platform_core/requirements-lock.txt

      - name: IaC scan (checkov)
        run: |
          pip install checkov
          checkov -d infra --quiet --compact --framework cloudformation

      - name: Terraform validate
        uses: hashicorp/setup-terraform@v3
      - name: terraform fmt + validate
        run: |
          cd infra/terraform
          terraform init -backend=false
          terraform fmt -check -recursive
          terraform validate

      - name: SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.json || cyclonedx-py -o sbom.json || true
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with: { name: sbom, path: sbom.json, if-no-files-found: ignore }

      - name: Filesystem vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,secret   # misconfig is covered by cfn-lint + checkov; keep this high-signal
          severity: CRITICAL,HIGH
          exit-code: "1"   # BLOCKING: a CRITICAL/HIGH vuln or leaked secret fails the job

      - name: Provenance note
        run: echo "Sign release artifacts (cosign) and attach SLSA provenance at the release job — see docs."
