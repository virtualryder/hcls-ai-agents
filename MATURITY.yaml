# MATURITY.yaml — machine-readable single source of truth for this repo's maturity claims.
# Every status number/word in README, SUITE-STATUS, decks, and GTM should agree with this
# file. When they drift, THIS FILE governs. Regenerate the test count with `make test`.
# Companion taxonomy: docs/CONNECTOR-MATURITY.md   ·   Boundaries: NOT-CLAIMS.md
schema_version: 1
repo: hcls-ai-agents
display_name: HCLS AI Agents (Healthcare & Life Sciences)
governance_pattern: "Aegis Governance Pattern (AGP) v1.0"   # conforms-to
positioning: reference-accelerator            # not an AWS service; not certified — see NOT-CLAIMS.md
updated: 2026-07-09

tests:
  offline_total: 583                          # collected-test count; verified by tools/check_maturity.py
  suites: 20
  reproduce: "make test   # scripts/run_all_tests.sh — per-process, no API key, no AWS"
  last_verified: 2026-07-10
  note: "Canonical offline suite: 583 passed across 20 isolated suites — verified 2026-07-12 by `bash scripts/run_all_tests.sh` (machine-checked by tools/check_maturity.py). A plain root `pytest` collects 579 (578 pass, 1 skip — the openFDA live-connector test skips without RUN_LIVE_OPENFDA=1) because reused package names collapse at root; MATURITY.yaml is the single source of truth. Prior stale counts: 452/503/519/536."

